run:
  type_data: test
  type_class: base
  split_type: base
  split_config:
    params:
      test_size: 0.2
      random_state: 42
      stratify: true

  type_class_model: transformers

full_data:
  data:
    path: C:\Users\Danch\PycharmProjects\Credit_Scoring_Model_w_transformers\data\Dataset_C\credit_scoring_train.csv
    sheet_name: "sheet_name"
    target: "target"
    dropna: False

  features:
    numeric:
    categorical:

model:
  model_name: tabtransformer_stage_C_zeroshot
  framework: sklearn
  ensemble:
    type: transformers_transfer
    voting: soft
    final_estimator: null
    estimators:
      - name: tabtransformer_zeroshot
        type: Transformers
        params:
          # ── Архитектура — должна совпадать со Stage A ────
          embed_dim: 32
          n_heads: 4
          n_layers: 2
          mlp_dim: 64

          # ── Регуляризация ────────────────────────────────
          dropout: 0.2
          weight_decay: 0.01

          # ── Обучение — zero_shot не обучается ────────────
          lr: 0.0001
          batch_size: 512
          epochs: 1              # zero_shot = только inference, эпохи не нужны
          early_stopping_patience: 5
          warmup_ratio: 0.0
          lambda_align: 0.0

          class_weight: 'balanced'

          # ── Transfer: zero_shot ──────────────────────────
          # Backbone загружается, input/head случайные
          # Никакого обучения — чистый zero-shot
          transfer_mode: 'zero_shot'

          backbone_path: C:\Users\Danch\PycharmProjects\Credit_Scoring_Model_w_transformers\models\transformers_\tabtransformer_finetune_none.pth

metrics:
  base:
    - auc
    - ks
    - fnr
    - tpr
    - fpr
    - precision
    - accuracy
