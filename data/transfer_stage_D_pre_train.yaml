run:
  type_data: test
  type_class: base
  split_type: base
  split_config:
    params:
      test_size: 0.15
      random_state: 42
      stratify: true

  type_class_model: transformers

full_data:
  data:
    path: C:\Users\Danch\PycharmProjects\Credit_Scoring_Model_w_transformers\data\Dataset_C\train_full.csv
    sheet_name: "sheet_name"
    target: "default_flg"
    dropna: False
    drop_columns:
      - "id"

  features:
    numeric:
    categorical:

model:
  model_name: tabtransformer_stage_D_Application
  framework: sklearn
  ensemble:
    type: transformers_transfer
    voting: soft
    final_estimator: null
    estimators:
      - name: tabtransformer_lending_projadapt
        type: Transformers
        params:
          dataset_name: "Application"
          model_name: "tabtransformer_stageD_applic"
          embed_dim: 64
          n_heads: 8
          n_layers: 4
          mlp_dim: 256

          dropout: 0.2
          weight_decay: 0.1

          lr: 0.00001
          batch_size: 256
          epochs: 25
          early_stopping_patience: 5
          warmup_ratio: 0.1
          lambda_align: 0.5
          adapt_epochs: 13
          transfer_mode: 'pretrain'
          class_weight: 'balanced'
metrics:
  base:
    - auc
    - ks
    - fnr
    - tpr
    - fpr
    - precision
    - accuracy
