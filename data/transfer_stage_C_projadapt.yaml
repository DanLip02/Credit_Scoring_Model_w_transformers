run:
  type_data: test
  type_class: base
  split_type: base
  split_config:
    params:
      test_size: 0.2
      random_state: 42
      stratify: true

  type_class_model: transformers

full_data:
  data:
    path: C:\Users\Danch\PycharmProjects\Credit_Scoring_Model_w_transformers\data\Dataset_C\credit_scoring_full_raw.csv
    sheet_name: "sheet_name"
    target: "target"
    dropna: False
    drop_columns:
      - "Customer_ID"

  features:
    numeric:
    categorical:

model:
  model_name: tabtransformer_stage_C_projadapt
  framework: sklearn
  ensemble:
    type: transformers_transfer
    voting: soft
    final_estimator: null
    estimators:
      - name: tabtransformer_projadapt
        type: Transformers
        params:
#          dataset_name: "CreditScoring"
          model_name: "tabtransformer_stageC_crs"
          embed_dim: 64
          n_heads: 8
          n_layers: 4
          mlp_dim: 256

          dropout: 0.2
          weight_decay: 0.1
          lr: 0.001
          batch_size: 128
          epochs: 15
          early_stopping_patience: 5
          warmup_ratio: 0.05
          lambda_align: 5

          class_weight: 'balanced'
          transfer_mode: 'proj_adapt'

          backbone_path: C:\Users\Danch\PycharmProjects\Credit_Scoring_Model_w_transformers\models\transformers_\tabtransformer_stageE_taiwan.pth
          adapt_epochs: 10
          freeze_mode: "full"

metrics:
  base:
    - auc
    - ks
    - fnr
    - tpr
    - fpr
    - precision
    - accuracy
