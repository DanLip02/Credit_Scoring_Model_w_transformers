run:
  type_data: test
  type_class: base
  split_type: base
  split_config:
    params:
      test_size: 0.2
      random_state: 42
      stratify: true

  type_class_model: transformers

full_data:
  data:
    path: C:\Users\Danch\PycharmProjects\Credit_Scoring_Model_w_transformers\data\Dataset_C\credit_scoring_full_raw.csv
    sheet_name: "sheet_name"
    target: "target"
    dropna: False

  features:
    numeric:
    categorical:

model:
  model_name: tabtransformer_stage_C_projadapt
  framework: sklearn
  ensemble:
    type: transformers_transfer
    voting: soft
    final_estimator: null
    estimators:
      - name: tabtransformer_projadapt
        type: Transformers
        params:
          # Архитектура должна совпадать со Stage A
          embed_dim: 32
          n_heads: 4
          n_layers: 2
          mlp_dim: 64

          dropout: 0.2
          weight_decay: 0.01
          lr: 0.0003            # чуть выше чем finetune — учим только входы
          batch_size: 512
          epochs: 15            # небольшой адаптационный этап
          early_stopping_patience: 5
          warmup_ratio: 0.05
          lambda_align: 0.0

          class_weight: 'balanced'
          transfer_mode: 'proj_adapt'

          backbone_path: C:\Users\Danch\PycharmProjects\Credit_Scoring_Model_w_transformers\models\transformers_\tabtransformer_finetune_none.pth
          adapt_epochs: 15

metrics:
  base:
    - auc
    - ks
    - fnr
    - tpr
    - fpr
    - precision
    - accuracy
