run:
  type_data: test
  type_class: base
  split_type: base #todo adapt to train
  split_config:
    params:
      test_size: 0.2
      random_state: 42
      stratify: true

  type_class_model: classification

full_data:
  data:
    path: C:\Users\Danch\PycharmProjects\Credit_Scoring_Model_w_transformers\data\Dataset_C\train_full.csv
    sheet_name: "sheet_name"
    target: "default_flg"
    dropna: False
    drop_columns:
      - "id"
#    skip: "skip"
#    date_column: "report_date"
#    filter_columns:
#      - "report_date"
#      - "global_id"

#    mapper:
#      1: 0
#      2: 1


  features:
    numeric:


    categorical:


model:
  model_name: XGBClassifier_test_transf_first_ds
  framework: sklearn
  ensemble:
    type: base         # possible right now: voting | stacking | bagging | bases
    voting: soft          # for VotingClassifier
    final_estimator: null # for StackingClassifier, example LogisticRegression
    estimators:
      - name: cb
        type: XGBClassifier
        params:
            n_estimators: 2000
            max_depth: 5
            learning_rate: 0.0001
            scale_pos_weight: 6  # вес дефолта
            eval_metric: 'auc'
            random_state: 42
            use_label_encoder: false

metrics:
#    custom:
#          ar:
#            use_transform: direct
#            min_benchmark: 1
#            max_benchmark: 7

    base:
      - auc
      - ks
      - fnr
      - tpr
      - fpr
      - precision
      - accuracy
