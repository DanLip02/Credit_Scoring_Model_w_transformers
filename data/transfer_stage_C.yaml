run:
  type_data: test
  type_class: base
  split_type: base
  split_config:
    params:
      test_size: 0.99          # почти весь датасет идёт в тест — обучения нет
      random_state: 42
      stratify: true

  type_class_model: transformers

full_data:
  data:
    path: C:\Users\Danch\PycharmProjects\Credit_Scoring_Model_w_transformers\data\Dataset_C\german_credit_risk.csv
    sheet_name: "sheet_name"
    target: "target"             # ← замени на имя целевой колонки в твоём German Credit
    dropna: True

    mapper:
          1: 0
          2: 1

  features:
    numeric:
    categorical:

model:
  model_name: tabtransformer_stage_C_zero_shot
  framework: sklearn
  ensemble:
    type: transformers_transfer
    voting: soft
    final_estimator: null
    estimators:
      - name: tabtransformer_stage_C
        type: Transformers
        params:
          # ── Архитектура — ДОЛЖНА совпадать с Stage A и B ──
          embed_dim: 32
          n_heads: 4
          n_layers: 2
          mlp_dim: 64
          dropout: 0.3
          weight_decay: 0.02

          # ── Обучение — не используется при zero_shot ──────
          lr: 0.0003
          batch_size: 128
          epochs: 5              # игнорируется при zero_shot
          early_stopping_patience: 5
          warmup_ratio: 0.05
          class_weight: "balanced"

          # ── Transfer: берём backbone из Stage B ──────────
          transfer_mode: "zero_shot"   # zero_shot = никакого обучения на C
          backbone_path: C:\Users\Danch\PycharmProjects\Credit_Scoring_Model_w_transformers\mlartifacts\0\models\m-10f8a60a10794ef0b9eb524ce708a92d\artifacts\data\model.pth

          # freeze_mode при zero_shot не важен — всё заморожено
          freeze_mode: "full"

metrics:
  base:
    - auc
    - ks
    - fnr
    - tpr
    - fpr
    - precision
    - accuracy
