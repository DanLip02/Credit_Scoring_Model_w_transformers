run:
  type_data: test
  type_class: base
  split_type: base
  split_config:
    params:
      test_size: 0.2          # меньше val — больше данных на обучение
      random_state: 42
      stratify: true

  type_class_model: transformers

full_data:
  data:
    path: C:\Users\Danch\PycharmProjects\Credit_Scoring_Model_w_transformers\data\Dataset_A\application_train_all_models_final_2.csv
    sheet_name: "sheet_name"
    target: "TARGET"
    dropna: False
    drop_columns:
      - "SK_ID_CURR"
      - "Unnamed: 0"

  features:
    numeric:
    categorical:

model:
  model_name: tabtransformer_stage_A
  framework: sklearn
  ensemble:
    type: transformers
    voting: soft
    final_estimator: null
    estimators:
      - name: tabtransformer_pretrain
        type: Transformers
        params:
          dataset_name: "HomeCredit"
          model_name: "tabtransformer_stageA_hc"

          embed_dim: 64
          n_heads: 8
          n_layers: 4
          mlp_dim: 256

          dropout: 0.15
          weight_decay: 0.1

          lr: 0.001
          batch_size: 128
          epochs: 15
          early_stopping_patience: 10
          warmup_ratio: 0.1
          transfer_mode: 'pretrain'
          class_weight: 'balanced'


metrics:
  base:
    - auc
    - ks
    - fnr
    - tpr
    - fpr
    - precision
    - accuracy
