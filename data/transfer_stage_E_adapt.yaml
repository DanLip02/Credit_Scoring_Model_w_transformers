run:
  type_data: test
  type_class: base
  split_type: base
  split_config:
    params:
      test_size: 0.2
      random_state: 42
      stratify: true

  type_class_model: transformers

full_data:
  data:
    path: C:\Users\Danch\PycharmProjects\Credit_Scoring_Model_w_transformers\data\taiwan_cc_full.csv
    sheet_name: "sheet_name"
    target: "target"
    dropna: False

  features:
    numeric:
    categorical:

model:
  model_name: tabtransformer_stage_E_taiwan_zeroshot
  framework: sklearn
  ensemble:
    type: transformers_transfer
    voting: soft
    final_estimator: null
    estimators:
      - name: tabtransformer_taiwan_zeroshot
        type: Transformers
        params:
          dataset_name: "TaiwanCC"
          model_name: "tabtransformer_stageE_taiwan"
          embed_dim: 64
          n_heads: 8
          n_layers: 4
          mlp_dim: 256

          dropout: 0.2
          weight_decay: 0.01

          lr: 0.00001
          batch_size: 128
          epochs: 10
          early_stopping_patience: 5
          warmup_ratio: 0.1
          lambda_align: 0.75

          class_weight: 'balanced'

          transfer_mode: 'proj_adapt'
          backbone_path: C:\Users\Danch\PycharmProjects\Credit_Scoring_Model_w_transformers\models\transformers_\tabtransformer_stageD_applic.pth
          adapt_epochs: 10
          freeze_mode: 'last_layer'

metrics:
  base:
    - auc
    - ks
    - fnr
    - tpr
    - fpr
    - precision
    - accuracy
